# codecoachai-file service config.
# Upload to Nacos: dataId=codecoachai-file-dev.yml group=DEFAULT_GROUP

codecoachai:
  file:
    # Storage provider: LOCAL / ALIYUN_OSS.
    # Dev acceptance uses real Aliyun OSS. Provide OSS_* env/private Nacos values before startup.
    storage:
      provider: ALIYUN_OSS
      root-path: ${CODECOACHAI_FILE_STORAGE_ROOT:./data/uploads}
      max-size-mb: 50
      allowed-extensions:
        - pdf
        - doc
        - docx
        - md
        - txt
        - png
        - jpg
        - jpeg

  oss:
    enabled: true
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_AK:}
    access-key-secret: ${OSS_SK:}
    domain: ${OSS_DOMAIN:}
    sign-url-expire-seconds: 900
    key-prefix: ${OSS_KEY_PREFIX:dev}
    sts:
      endpoint: ${OSS_STS_ENDPOINT:sts.cn-hangzhou.aliyuncs.com}
      region-id: ${OSS_STS_REGION_ID:cn-hangzhou}
      role-arn: ${OSS_STS_ROLE_ARN:}
      role-session-name: codecoachai
      duration-seconds: 3600

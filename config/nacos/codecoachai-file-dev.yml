# ============================================================
# codecoachai-file 服务专属配置（OSS 接入版）
# 上传到 Nacos: dataId=codecoachai-file-dev.yml  group=DEFAULT_GROUP
# ============================================================

codecoachai:
  file:
    # 文件存储策略：LOCAL（本地）/ ALIYUN_OSS（阿里云）
    # 切换时只改这里，无需重启代码
    storage:
      provider: ALIYUN_OSS
      root-path: ${CODECOACHAI_FILE_STORAGE_ROOT:./data/uploads}
      max-size-mb: 50
      allowed-extensions:
        - pdf
        - doc
        - docx
        - md
        - txt
        - png
        - jpg
        - jpeg

  # OSS：file 服务可独立覆盖 common 里的默认值
  oss:
    enabled: true

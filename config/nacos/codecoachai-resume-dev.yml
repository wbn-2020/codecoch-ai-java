server:
  port: 9204

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:codecoachai_v1}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

codecoachai:
  resume:
    export:
      # Upload admission concurrency and wait settings apply at resume service startup; restart is required after changes.
      max-concurrent-uploads: ${RESUME_EXPORT_MAX_CONCURRENT_UPLOADS:2}
      upload-acquire-timeout-millis: ${RESUME_EXPORT_UPLOAD_ACQUIRE_TIMEOUT_MILLIS:250}
  features:
    v7:
      campaign-workspace: true
      real-interview: true
      offer: true
      contact-activity: true
      research: true

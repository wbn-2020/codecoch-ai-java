# ============================================================
# codecoachai-gateway 路由配置
# 上传到 Nacos: dataId=codecoachai-gateway-dev.yml  group=DEFAULT_GROUP
# ============================================================

server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # ========== 认证 ==========
        - id: auth
          uri: lb://codecoachai-auth
          predicates:
            - Path=/auth/**

        # ========== 用户 ==========
        - id: system-role-menus
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/roles/*/menus

        - id: user
          uri: lb://codecoachai-user
          predicates:
            - Path=/users,/users/**,/admin/users,/admin/users/**,/admin/roles,/admin/roles/**,/dashboard,/dashboard/**

        # ========== 题库 ==========
        - id: question
          uri: lb://codecoachai-question
          predicates:
            - Path=/questions,/questions/**,/admin/questions,/admin/questions/**,/admin/question-relations,/admin/question-relations/**,/admin/question-categories,/admin/question-categories/**,/admin/question-tags,/admin/question-tags/**,/admin/question-groups,/admin/question-groups/**,/admin/question-reviews,/admin/question-reviews/**,/admin/question-duplicate-reviews,/admin/question-duplicate-reviews/**,/admin/question-duplicate-eval,/admin/question-duplicate-eval/**,/admin/ai/questions/**,/categories,/categories/**,/tags,/tags/**,/practice,/practice/**,/question-recommendations,/question-recommendations/**,/ai/sse/admin/questions/**

        # ========== 简历 ==========
        - id: resume
          uri: lb://codecoachai-resume
          predicates:
            - Path=/resumes,/resumes/**,/admin/resumes,/admin/resumes/**,/skill-profiles,/skill-profiles/**,/job-targets,/job-targets/**,/resume-job-match,/resume-job-match/**,/applications,/applications/**,/resume-versions,/resume-versions/**,/ai/sse/resume/**,/ai/sse/resume-optimize,/ai/sse/job-targets/**,/ai/sse/resume-job-match/**

        # ========== 面试 ==========
        - id: interview
          uri: lb://codecoachai-interview
          predicates:
            - Path=/interviews,/interviews/**,/admin/interviews,/admin/interviews/**,/admin/interview-reports,/admin/interview-reports/**,/admin/industry-templates,/admin/industry-templates/**,/study-plans,/study-plans/**,/study-tasks,/study-tasks/**,/study-checkins,/study-checkins/**,/daily-tasks,/daily-tasks/**,/industry-templates,/industry-templates/**,/ai/sse/interviews/**,/ai/sse/interview-question,/ai/sse/interview-comment,/ai/sse/interview-answer-review,/ai/sse/report,/ai/sse/interview-report,/ai/sse/study-plan

        # ========== AI ==========
        - id: ai
          uri: lb://codecoachai-ai
          predicates:
            - Path=/ai/health,/admin/ai/**,/agent/**,/admin/agent/**,/growth/**,/analytics/**,/admin/analytics/**,/admin/vector-store/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ========== 文件 ==========
        - id: file
          uri: lb://codecoachai-file
          predicates:
            - Path=/files,/files/**,/admin/files,/admin/files/**

        # ========== 异步任务中心（V3 新增） ==========
        - id: task
          uri: lb://codecoachai-task
          predicates:
            - Path=/tasks,/tasks/**,/admin/tasks,/admin/tasks/**,/admin/notifications,/admin/notifications/**,/notifications,/notifications/**

        # ========== 搜索（V3 新增） ==========
        - id: search
          uri: lb://codecoachai-search
          predicates:
            - Path=/search,/search/**,/admin/search,/admin/search/**

        # ========== 系统管理 ==========
        - id: system
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/system,/admin/system/**,/admin/config,/admin/config/**,/admin/configs,/admin/configs/**,/admin/menus,/admin/menus/**,/admin/dashboard,/admin/dashboard/**,/admin/login-logs,/admin/login-logs/**,/admin/operation-logs,/admin/operation-logs/**,/admin/logs,/admin/logs/**,/admin/audit,/admin/audit/**,/admin/announcements,/admin/announcements/**,/admin/stats,/admin/stats/**,/announcements,/announcements/**

      # 全局 CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # 全局过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# ============================================================
# Knife4j 聚合文档（Gateway 统一入口 /doc.html）
# ============================================================
knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - codecoachai-gateway

codecoachai:
  gateway:
    cors:
      allowed-origin-patterns: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"

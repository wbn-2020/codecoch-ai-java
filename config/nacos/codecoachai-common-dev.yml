# ============================================================
# CodeCoachAI 公共配置 - dev profile
# 上传到 Nacos: dataId=codecoachai-common-dev.yml  group=DEFAULT_GROUP
# 本文件包含所有服务都需要的连接配置
# ============================================================

spring:
  # 数据源（dev 统一使用 codecoachai_v1，需与 Flyway 默认库名保持一致）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:codecoachai_v1}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  # Flyway（默认关闭，由专门服务执行迁移；也可在 system 服务里开启）
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2.999
    table: flyway_schema_history

# ============================================================
# RocketMQ
# ============================================================
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:rocketmq-namesrv:9876}
  producer:
    group: codecoachai-producer
    send-message-timeout: 5000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# ============================================================
# 阿里云 OSS（dev 验收使用真实 OSS，启动前需填凭证）
# ============================================================
codecoachai:
  internal:
    auth:
      enabled: true
      secret: ${CODECOACHAI_INTERNAL_SECRET}
      allowed-clock-skew-seconds: 300
      nonce-ttl-seconds: 300

  oss:
    enabled: true
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_AK:}
    access-key-secret: ${OSS_SK:}
    domain: ${OSS_DOMAIN:}
    sign-url-expire-seconds: 900
    key-prefix: ${OSS_KEY_PREFIX:dev}
    sts:
      endpoint: ${OSS_STS_ENDPOINT:sts.cn-hangzhou.aliyuncs.com}
      region-id: ${OSS_STS_REGION_ID:cn-hangzhou}
      role-arn: ${OSS_STS_ROLE_ARN:}
      role-session-name: codecoachai
      duration-seconds: 3600

  # ============================================================
  # AI（DeepSeek 主力 + 通义降级；OpenAI 兼容协议）
  # ============================================================
  ai:
    enabled: true
    mock-enabled: false
    provider: openai-compatible
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
    temperature: 0.3
    max-tokens: 2048
    timeout-seconds: 60
    # 路由器（后续 AiModelRouter 使用）
    router:
      default-provider: deepseek
      fallback-provider: dashscope
      embedding-provider: dashscope
    providers:
      deepseek:
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_API_KEY:}
        chat-model: deepseek-chat
        reasoner-model: deepseek-reasoner
        embedding-model:
      dashscope:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY:}
        chat-model: qwen-plus
        reasoner-model: qwen-max
        embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
    quota:
      per-user-day: 200
      per-user-minute: 20

  # ============================================================
  # Elasticsearch
  # ============================================================
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}
    username: elastic
    password: ${ELASTIC_PASSWORD}

  # ============================================================
  # Vector store (Qdrant)
  # ============================================================
  vector:
    enabled: ${CODECOACHAI_VECTOR_ENABLED:true}
    provider: qdrant
    base-url: ${QDRANT_BASE_URL:http://qdrant:6333}
    api-key: ${QDRANT_API_KEY}
    connect-timeout: 3s
    request-timeout: 15s
    default-limit: 10

  ops:
    health-services: ${CODECOACHAI_OPS_HEALTH_SERVICES:codecoachai-gateway|codecoachai-gateway|8080|gateway,codecoachai-auth|codecoachai-auth|9201|service,codecoachai-user|codecoachai-user|9202|service,codecoachai-resume|codecoachai-resume|9204|service,codecoachai-interview|codecoachai-interview|9205|service,codecoachai-question|codecoachai-question|9203|service,codecoachai-ai|codecoachai-ai|9206|service,codecoachai-task|codecoachai-task|8090|service,codecoachai-file|codecoachai-file|8080|service}

# ============================================================
# MyBatis-Plus（标准配置）
# ============================================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  mapper-locations: classpath*:mapper/**/*.xml

# ============================================================
# SA-Token
# ============================================================
sa-token:
  token-name: Authorization
  timeout: 604800
  active-timeout: 86400
  is-concurrent: true
  is-share: false
  is-log: false
  is-read-cookie: false
  is-read-header: true

# ============================================================
# Knife4j
# ============================================================
knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-version: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name:codecoachai-service}

# ============================================================
# 日志
# ============================================================
logging:
  file:
    path: ${CODECOACHAI_LOG_PATH:./logs/${spring.application.name:codecoachai-service}}
  level:
    root: INFO
    com.codecoachai: DEBUG
    org.springframework: INFO
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
      total-size-cap: 1GB
      clean-history-on-start: false
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{64} - %msg%n"

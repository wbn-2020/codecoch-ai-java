# ============================================================
# codecoachai-search service config
# Upload to Nacos: dataId=codecoachai-search-dev.yml group=DEFAULT_GROUP
# ============================================================

codecoachai:
  search:
    refresh-interval: 1s
    default-page-size: 10
    fallback-to-record: true
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}
    username: elastic
    password: ${ELASTIC_PASSWORD}

rocketmq:
  consumer:
    group: codecoachai-search-consumer

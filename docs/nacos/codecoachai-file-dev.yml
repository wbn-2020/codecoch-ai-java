server:
  port: 9209

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/codecoachai_v1?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

codecoachai:
  file:
    storage:
      provider: ALIYUN_OSS
      root-path: ${CODECOACHAI_FILE_STORAGE_ROOT:./data/uploads}
      max-size-mb: 50
      allowed-extensions:
        - pdf
        - doc
        - docx
        - md
        - txt
        - png
        - jpg
        - jpeg
  oss:
    enabled: true
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${OSS_BUCKET:codecoachai}
    access-key-id: ${OSS_AK:}
    access-key-secret: ${OSS_SK:}
    domain: ${OSS_DOMAIN:}
    sign-url-expire-seconds: 900
    key-prefix: ${OSS_KEY_PREFIX:dev}
    sts:
      endpoint: ${OSS_STS_ENDPOINT:sts.cn-hangzhou.aliyuncs.com}
      region-id: ${OSS_STS_REGION_ID:cn-hangzhou}
      role-arn: ${OSS_STS_ROLE_ARN:}
      role-session-name: codecoachai
      duration-seconds: 3600

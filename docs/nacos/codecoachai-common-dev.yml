spring:
  cloud:
    nacos:
      discovery:
        ip: 127.0.0.1
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  file:
    path: ${CODECOACHAI_LOG_PATH:./logs/${spring.application.name:codecoachai-service}}
  level:
    root: INFO
    com.codecoachai: INFO
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
      total-size-cap: 1GB
      clean-history-on-start: false
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{64} - %msg%n"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true

codecoachai:
  internal:
    auth:
      enabled: true
      secret: ${CODECOACHAI_INTERNAL_SECRET:}
      allowed-clock-skew-seconds: 300
      nonce-ttl-seconds: 300

  vector:
    enabled: ${CODECOACHAI_VECTOR_ENABLED:false}
    provider: qdrant
    base-url: ${QDRANT_BASE_URL:http://127.0.0.1:6333}
    api-key: ${QDRANT_API_KEY:}
    connect-timeout: 3s
    request-timeout: 15s
    default-limit: 10

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: codecoachai-producer
    send-message-timeout: 5000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

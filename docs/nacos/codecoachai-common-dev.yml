spring:
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    root: INFO
    com.codecoachai: INFO

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info

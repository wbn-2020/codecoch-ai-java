server:
  port: 9201

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/codecoachai_v1?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-cookie: false
  token-prefix: Bearer
  is-print: false

codecoachai:
  auth:
    token-expire-seconds: 86400
    password-reset:
      delivery-provider: ${PASSWORD_RESET_DELIVERY_PROVIDER:mock}
      allow-mock: ${PASSWORD_RESET_ALLOW_MOCK:true}
      reset-url-template: ${PASSWORD_RESET_URL_TEMPLATE:http://localhost:5173/reset-password#token={token}}
      from: ${PASSWORD_RESET_MAIL_FROM:}
      subject: CodeCoachAI password reset

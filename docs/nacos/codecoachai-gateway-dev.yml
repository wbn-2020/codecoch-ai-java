server:
  port: 18080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: codecoachai-auth
          uri: lb://codecoachai-auth
          predicates:
            - Path=/auth/**
        - id: codecoachai-user-users
          uri: lb://codecoachai-user
          predicates:
            - Path=/users,/users/**
        - id: codecoachai-user-dashboard
          uri: lb://codecoachai-user
          predicates:
            - Path=/dashboard,/dashboard/**
        - id: codecoachai-user-admin-users
          uri: lb://codecoachai-user
          predicates:
            - Path=/admin/users,/admin/users/**
        - id: codecoachai-system-admin-role-menus
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/roles/*/menus
        - id: codecoachai-user-admin-roles
          uri: lb://codecoachai-user
          predicates:
            - Path=/admin/roles,/admin/roles/**
        - id: codecoachai-question-users
          uri: lb://codecoachai-question
          predicates:
            - Path=/questions,/questions/**
        - id: codecoachai-question-recommendations
          uri: lb://codecoachai-question
          predicates:
            - Path=/question-recommendations,/question-recommendations/**
        - id: codecoachai-question-practice
          uri: lb://codecoachai-question
          predicates:
            - Path=/practice,/practice/**
        - id: codecoachai-question-admin-questions
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/questions,/admin/questions/**
        - id: codecoachai-question-admin-reviews
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-reviews,/admin/question-reviews/**
        - id: codecoachai-question-admin-relations
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-relations,/admin/question-relations/**
        - id: codecoachai-question-admin-ai-generate
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/ai/questions/generate
        - id: codecoachai-question-admin-sse
          uri: lb://codecoachai-question
          predicates:
            - Path=/ai/sse/admin/questions/**
        - id: codecoachai-question-admin-duplicate-reviews
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-duplicate-reviews,/admin/question-duplicate-reviews/**
        - id: codecoachai-question-admin-categories
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-categories,/admin/question-categories/**
        - id: codecoachai-question-admin-tags
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-tags,/admin/question-tags/**
        - id: codecoachai-question-admin-groups
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-groups,/admin/question-groups/**
        - id: codecoachai-resume
          uri: lb://codecoachai-resume
          predicates:
            - Path=/resumes,/resumes/**,/resume-versions,/resume-versions/**,/applications,/applications/**
        - id: codecoachai-resume-job-targets
          uri: lb://codecoachai-resume
          predicates:
            - Path=/job-targets,/job-targets/**
        - id: codecoachai-resume-job-match
          uri: lb://codecoachai-resume
          predicates:
            - Path=/resume-job-match,/resume-job-match/**
        - id: codecoachai-resume-skill-profiles
          uri: lb://codecoachai-resume
          predicates:
            - Path=/skill-profiles,/skill-profiles/**
        - id: codecoachai-resume-sse
          uri: lb://codecoachai-resume
          predicates:
            - Path=/ai/sse/resume-optimize,/ai/sse/job-targets/**,/ai/sse/resume-job-match/**
        - id: codecoachai-interview
          uri: lb://codecoachai-interview
          predicates:
            - Path=/interviews,/interviews/**,/admin/interviews,/admin/interviews/**
        - id: codecoachai-interview-industry-templates
          uri: lb://codecoachai-interview
          predicates:
            - Path=/industry-templates,/industry-templates/**
        - id: codecoachai-interview-admin-industry-templates
          uri: lb://codecoachai-interview
          predicates:
            - Path=/admin/industry-templates,/admin/industry-templates/**
        - id: codecoachai-interview-admin-reports
          uri: lb://codecoachai-interview
          predicates:
            - Path=/admin/interview-reports,/admin/interview-reports/**
        - id: codecoachai-study
          uri: lb://codecoachai-interview
          predicates:
            - Path=/study-plans,/study-plans/**,/study-tasks,/study-tasks/**,/study-checkins,/study-checkins/**,/daily-tasks,/daily-tasks/**
        - id: codecoachai-interview-sse
          uri: lb://codecoachai-interview
          predicates:
            - Path=/ai/sse/interview-question,/ai/sse/interview-comment,/ai/sse/interview-answer-review,/ai/sse/report,/ai/sse/interview-report,/ai/sse/study-plan
        - id: codecoachai-ai-admin
          uri: lb://codecoachai-ai
          predicates:
            - Path=/ai/health,/admin/ai/**,/agent/**,/admin/agent/**,/growth/**,/analytics/**,/admin/analytics/**
        - id: codecoachai-file-admin
          uri: lb://codecoachai-file
          predicates:
            - Path=/admin/files,/admin/files/**
        - id: codecoachai-file-users
          uri: lb://codecoachai-file
          predicates:
            - Path=/files,/files/**,/knowledge,/knowledge/**
        - id: codecoachai-task
          uri: lb://codecoachai-task
          predicates:
            - Path=/tasks,/tasks/**,/admin/tasks,/admin/tasks/**,/admin/notifications,/admin/notifications/**,/notifications,/notifications/**
        - id: codecoachai-search
          uri: lb://codecoachai-search
          predicates:
            - Path=/search,/search/**,/admin/search,/admin/search/**
        - id: codecoachai-system-admin
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/system,/admin/system/**
        - id: codecoachai-system-admin-dashboard
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/dashboard,/admin/dashboard/**
        - id: codecoachai-system-configs
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/configs,/admin/configs/**,/admin/config,/admin/config/**,/admin/menus,/admin/menus/**,/admin/login-logs,/admin/login-logs/**,/admin/operation-logs,/admin/operation-logs/**,/admin/logs,/admin/logs/**,/admin/audit,/admin/audit/**,/admin/announcements,/admin/announcements/**,/admin/stats,/admin/stats/**,/announcements,/announcements/**

codecoachai:
  gateway:
    cors:
      allowed-origin-patterns: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"
    auth:
      white-paths:
        - /auth/login
        - /auth/register
      token-info-timeout-seconds: 3

server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: codecoachai-auth
          uri: lb://codecoachai-auth
          predicates:
            - Path=/auth/**
        - id: codecoachai-user-users
          uri: lb://codecoachai-user
          predicates:
            - Path=/users/**
        - id: codecoachai-user-dashboard
          uri: lb://codecoachai-user
          predicates:
            - Path=/dashboard/**
        - id: codecoachai-user-admin-users
          uri: lb://codecoachai-user
          predicates:
            - Path=/admin/users/**
        - id: codecoachai-user-admin-roles
          uri: lb://codecoachai-user
          predicates:
            - Path=/admin/roles
        - id: codecoachai-question-users
          uri: lb://codecoachai-question
          predicates:
            - Path=/questions/**
        - id: codecoachai-question-practice
          uri: lb://codecoachai-question
          predicates:
            - Path=/practice/**
        - id: codecoachai-question-admin-questions
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/questions/**
        - id: codecoachai-question-admin-reviews
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-reviews/**
        - id: codecoachai-question-admin-sse
          uri: lb://codecoachai-question
          predicates:
            - Path=/ai/sse/admin/questions/**
        - id: codecoachai-question-admin-duplicate-reviews
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-duplicate-reviews/**
        - id: codecoachai-question-admin-categories
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-categories/**
        - id: codecoachai-question-admin-tags
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-tags/**
        - id: codecoachai-question-admin-groups
          uri: lb://codecoachai-question
          predicates:
            - Path=/admin/question-groups/**
        - id: codecoachai-resume
          uri: lb://codecoachai-resume
          predicates:
            - Path=/resumes/**
        - id: codecoachai-resume-sse
          uri: lb://codecoachai-resume
          predicates:
            - Path=/ai/sse/resume-optimize
        - id: codecoachai-interview
          uri: lb://codecoachai-interview
          predicates:
            - Path=/interviews/**
        - id: codecoachai-study
          uri: lb://codecoachai-interview
          predicates:
            - Path=/study-plans/**,/study-tasks/**
        - id: codecoachai-interview-sse
          uri: lb://codecoachai-interview
          predicates:
            - Path=/ai/sse/interview-question,/ai/sse/interview-comment,/ai/sse/interview-answer-review,/ai/sse/report,/ai/sse/interview-report,/ai/sse/study-plan
        - id: codecoachai-ai-admin
          uri: lb://codecoachai-ai
          predicates:
            - Path=/admin/ai/**
        - id: codecoachai-file-admin
          uri: lb://codecoachai-file
          predicates:
            - Path=/admin/files/**
        - id: codecoachai-system-admin
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/system/**
        - id: codecoachai-system-admin-dashboard
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/dashboard/**
        - id: codecoachai-system-configs
          uri: lb://codecoachai-system
          predicates:
            - Path=/admin/configs/**

codecoachai:
  gateway:
    auth:
      white-paths:
        - /auth/login
        - /auth/register
      token-info-timeout-seconds: 3

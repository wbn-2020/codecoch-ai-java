spring:
  application:
    name: codecoachai-question
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:codecoachai-common-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:codecoachai-question-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
        file-extension: yml

codecoachai:
  question:
    duplicate:
      max-batch-check-count: 100
      max-rule-candidate-count: 200
      max-vector-seed-count: 300
      vector-search-limit: 30
      embedding-batch-size: 64
      title-jaccard-threshold: 0.75
      title-levenshtein-threshold: 0.82
      content-similarity-threshold: 0.70
      semantic-similarity-threshold: 0.82
      semantic-vector-weight: 0.78
      semantic-text-weight: 0.22

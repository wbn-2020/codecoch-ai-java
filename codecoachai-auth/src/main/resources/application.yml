spring:
  application:
    name: codecoachai-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:codecoachai-common-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:codecoachai-redis-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:codecoachai-auth-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
        file-extension: yml

codecoachai:
  auth:
    password-reset:
      delivery-provider: ${PASSWORD_RESET_DELIVERY_PROVIDER:mock}
      allow-mock: ${PASSWORD_RESET_ALLOW_MOCK:true}
      reset-url-template: ${PASSWORD_RESET_URL_TEMPLATE:https://codecoachai.example/reset-password#token={token}}

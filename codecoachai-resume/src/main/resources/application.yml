spring:
  application:
    name: codecoachai-resume
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:codecoachai-common-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:codecoachai-resume-dev.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: DEFAULT_GROUP
        file-extension: yml
codecoachai:
  resume:
    export:
      max-source-text-bytes: ${RESUME_EXPORT_MAX_SOURCE_TEXT_BYTES:524288}
      max-artifact-bytes: ${RESUME_EXPORT_MAX_ARTIFACT_BYTES:10485760}
      max-zip-entries: ${RESUME_EXPORT_MAX_ZIP_ENTRIES:12}
      # Upload admission concurrency and wait settings apply at resume service startup; restart is required after changes.
      max-concurrent-uploads: ${RESUME_EXPORT_MAX_CONCURRENT_UPLOADS:2}
      upload-acquire-timeout-millis: ${RESUME_EXPORT_UPLOAD_ACQUIRE_TIMEOUT_MILLIS:250}
      pdf-font-path: ${RESUME_EXPORT_PDF_FONT_PATH:}

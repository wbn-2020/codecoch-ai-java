      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker push codecoachai/${{ matrix.service }}:${{ github.sha }}
      #     docker push codecoachai/${{ matrix.service }}:latest

name: Backend CI

on:
  push:
    branches:
      - dev-v3
  pull_request:
    branches:
      - dev-v3

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Whitespace check
        run: git diff --check

      - name: Compile
        run: mvn clean compile

version: '3.8'

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

# ============================================================
# CodeCoachAI V3 本地开发环境 docker-compose
# 默认仅启动基础设施：MySQL + Redis + Nacos
# 按需 profile：mq、mq-dashboard、search、vector
# 业务服务建议在 IDE 中启动（方便调试）
# 注意：该 compose 仅用于本机开发，端口默认绑定 127.0.0.1，不应直接用于公网或准生产。
# MySQL 首次只导入 V2 基线 init.sql；随后由一次性 flyway-migrate 服务执行 V3+ migration。
# 初始化仅在首次创建 mysql-data 时执行，使用前确认目标 volume 可丢弃。
# ============================================================

services:
  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: codecoachai-mysql
    logging: *default-logging
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required for local MySQL}
      MYSQL_DATABASE: codecoachai_v1
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Database migration ----------
  # init.sql represents the existing schema at Flyway baseline 2.999.
  # This one-shot job baselines a fresh schema and applies V3/V4 migrations exactly once.
  flyway-migrate:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: codecoachai-flyway-migrate
    logging: *default-logging
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required for Flyway}
      MAVEN_OPTS: "-Xms128m -Xmx384m"
    volumes:
      - ./:/workspace:ro
      - maven-cache:/root/.m2
    command:
      - mvn
      - -q
      - -DskipTests
      - -Dflyway.url=jdbc:mysql://mysql:3306/codecoachai_v1?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - -Dflyway.user=root
      - flyway:migrate
    restart: "no"

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: codecoachai-redis
    logging: *default-logging
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required for local Redis}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Nacos ----------
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: codecoachai-nacos
    logging: *default-logging
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 256m
      JVM_XMX: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- RocketMQ NameServer ----------
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: codecoachai-rocketmq-namesrv
    profiles:
      - mq
      - mq-dashboard
    logging: *default-logging
    ports:
      - "127.0.0.1:9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"

  # ---------- RocketMQ Broker ----------
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: codecoachai-rocketmq-broker
    profiles:
      - mq
    logging: *default-logging
    ports:
      - "127.0.0.1:10911:10911"
      - "127.0.0.1:10909:10909"
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx512m"
      NAMESRV_ADDR: rocketmq-namesrv:9876

  # ---------- RocketMQ Dashboard（可选） ----------
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:1.0.0
    container_name: codecoachai-rocketmq-dashboard
    profiles:
      - mq-dashboard
    logging: *default-logging
    ports:
      - "127.0.0.1:18080:8080"
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"

  # ---------- Elasticsearch ----------
  elasticsearch:
    image: elasticsearch:8.14.3
    container_name: codecoachai-elasticsearch
    profiles:
      - search
    logging: *default-logging
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required for local Elasticsearch}
      ES_JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Qdrant ----------
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: codecoachai-qdrant
    profiles:
      - vector
    logging: *default-logging
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required for local Qdrant}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --header=\"api-key: $${QDRANT__SERVICE__API_KEY}\" -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  maven-cache:
  redis-data:
  es-data:
  qdrant-data:
